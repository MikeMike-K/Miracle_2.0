<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Выбор компании</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a href="{{ url_for('view_project', project_id=project_id) }}" class="btn btn-outline-light btn-sm">← Назад к проекту</a>
        </div>
    </nav>
    <div class="container">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Выберите компанию для добавления в проект</h5>
            </div>
            <div class="card-body p-0">
                {% if companies %}
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Наименование</th>
                            <th>Тип</th>
                            <th style="width:120px" class="text-center">Действие</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for c in companies %}
                        <tr>
                            <td class="fw-bold">{{ c[1] }}</td>
                            <td><span class="badge bg-secondary">{{ c[2] }}</span></td>
                            <td class="text-center">
                                <form method="POST" action="{{ url_for('link_company_to_project', project_id=project_id) }}" class="d-inline">
                                    <input type="hidden" name="company_id" value="{{ c[0] }}">
                                    <button type="submit" class="btn btn-sm btn-outline-primary">Добавить</button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                {% else %}
                <div class="text-center p-5 text-muted">
                    <p>В системе пока нет доступных компаний.</p>
                    <a href="{{ url_for('add_company', project_id=project_id) }}" class="btn btn-success">
                        <i class="bi bi-plus-lg me-1"></i> Создать новую компанию
                    </a>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
