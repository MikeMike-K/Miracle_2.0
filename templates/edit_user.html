<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование пользователя</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --corp-dark-blue: #0F172A; --corp-mid-blue: #1E3A8A; --corp-light-blue: #38BDF8; --corp-orange: #F97316; --corp-bg-light: #F0F9FF; }
        body { font-family: 'Inter', sans-serif; background-color: var(--corp-bg-light); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .modern-card { background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 500px; overflow: hidden; }
        .card-header-custom { background: linear-gradient(135deg, var(--corp-mid-blue), var(--corp-light-blue)); color: white; padding: 1.5rem; font-weight: 600; font-size: 1.2rem; }
        .form-control, .form-select { border: 2px solid #E2E8F0; border-radius: 8px; padding: 0.7rem; }
        .form-control:focus, .form-select:focus { border-color: var(--corp-light-blue); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15); }
        .btn-corp { background: linear-gradient(135deg, var(--corp-mid-blue), var(--corp-light-blue)); border: none; color: white; font-weight: 600; border-radius: 8px; padding: 0.7rem; width: 100%; transition: all 0.2s; }
        .btn-corp:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3); color: white; }
    </style>
    <style>
        :root {
            --corp-dark-blue: #0F172A;
            --corp-mid-blue: #1E3A8A;
            --corp-light-blue: #38BDF8;
            --corp-orange: #F97316;
            --corp-yellow: #FBBF24;
            --corp-bg-light: #F0F9FF;
        }
        body {
            background-color: var(--corp-bg-light);
            font-family: 'Inter', sans-serif;
        }
        /* Навигационная панель */
        .navbar-dark.bg-dark {
            background: linear-gradient(90deg, var(--corp-dark-blue), var(--corp-mid-blue)) !important;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.1);
        }
        /* Карточки */
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        /* Заголовки карточек */
        .card-header.bg-primary { background-color: var(--corp-mid-blue) !important; }
        .card-header.bg-success { background-color: #10B981 !important; } /* Изумрудный для успеха */
        .card-header.bg-warning { background-color: var(--corp-yellow) !important; color: var(--corp-dark-blue) !important; }
        .card-header.bg-info { background-color: var(--corp-light-blue) !important; color: var(--corp-dark-blue) !important; }

        /* Кнопки */
        .btn-primary {
            background-color: var(--corp-mid-blue);
            border-color: var(--corp-mid-blue);
        }
        .btn-primary:hover {
            background-color: var(--corp-dark-blue);
            border-color: var(--corp-dark-blue);
        }
        .btn-success {
            background-color: var(--corp-orange);
            border-color: var(--corp-orange);
            color: white;
        }
        .btn-success:hover {
            background-color: #ea580c;
            border-color: #ea580c;
            color: white;
        }
        .btn-warning {
            background-color: var(--corp-yellow);
            border-color: var(--corp-yellow);
            color: var(--corp-dark-blue);
            font-weight: 600;
        }
        /* Таблицы */
        .table-hover tbody tr:hover {
            background-color: rgba(56, 189, 248, 0.1); /* Легкий голубой при наведении */
        }
        /* Вкладки (Tabs) */
        .nav-tabs .nav-link.active {
            color: var(--corp-mid-blue);
            border-top: 3px solid var(--corp-orange);
            font-weight: 600;
        }
        .nav-tabs .nav-link {
            color: #64748B;
        }
        .nav-tabs .nav-link:hover {
            color: var(--corp-mid-blue);
            border-color: transparent;
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="modern-card">
            <div class="card-header-custom text-center">
                <i class="bi bi-person-gear me-2"></i>Редактирование пользователя
            </div>
            <div class="card-body p-4">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} border-0">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Фамилия</label>
                            <input type="text" name="last_name" class="form-control" value="{{ user[4] }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Имя</label>
                            <input type="text" name="first_name" class="form-control" value="{{ user[3] }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted">Отчество</label>
                            <input type="text" name="patronymic" class="form-control" value="{{ user[5] or '' }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted">Почта</label>
                            <input type="email" name="email" class="form-control" value="{{ user[6] }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted">Логин</label>
                            <input type="text" name="username" class="form-control" value="{{ user[1] }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted">Роль</label>
                            <select name="role" class="form-select" required>
                                <option value="local_admin" {% if user[2] == 'local_admin' %}selected{% endif %}>Локальный админ</option>
                                <option value="manager" {% if user[2] == 'manager' %}selected{% endif %}>Менеджер</option>
                                <option value="admin" {% if user[2] == 'admin' %}selected{% endif %}>Главный админ</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted">Новый пароль <span class="text-muted fw-normal">(оставьте пустым, чтобы не менять)</span></label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••">
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-corp">Сохранить изменения</button>
                        <a href="{{ url_for('admin') }}" class="btn btn-outline-secondary text-decoration-none">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
