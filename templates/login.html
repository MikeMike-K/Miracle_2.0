<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему | Miracle_2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --corp-dark-blue: #0F172A;
            --corp-mid-blue: #1E3A8A;
            --corp-light-blue: #38BDF8;
            --corp-orange: #F97316;
            --corp-yellow: #FBBF24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--corp-dark-blue) 0%, var(--corp-mid-blue) 50%, #0ea5e9 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        /* Декоративные круги на фоне */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }
        .shape-1 { width: 300px; height: 300px; background: var(--corp-light-blue); top: -50px; left: -50px; opacity: 0.3; }
        .shape-2 { width: 400px; height: 400px; background: var(--corp-orange); bottom: -100px; right: -100px; opacity: 0.2; }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-top: 5px solid var(--corp-orange);
            z-index: 1;
            width: 100%;
            max-width: 400px;
        }
        .logo-text {
            font-weight: 800;
            font-size: 2rem;
            color: var(--corp-dark-blue);
            letter-spacing: -1px;
        }
        .logo-version {
            background: linear-gradient(90deg, var(--corp-orange), var(--corp-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .form-control {
            border: 2px solid #E2E8F0;
            border-radius: 8px;
            padding: 12px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: var(--corp-light-blue);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }
        .btn-corp {
            background: linear-gradient(90deg, var(--corp-orange), #ea580c);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }
        .btn-corp:hover {
            background: linear-gradient(90deg, #ea580c, var(--corp-orange));
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(249, 115, 22, 0.4);
            color: white;
        }
        .form-label {
            font-weight: 600;
            color: var(--corp-dark-blue);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- Декоративные элементы фона -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="login-card p-4 p-md-5">
        <div class="text-center mb-4">
            <!-- Логотип -->
            <div class="logo-text">
                Miracle<span class="logo-version">_2.0</span>
            </div>
            <p class="text-muted mt-2 small">Корпоративная система управления</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} border-0 shadow-sm">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Логин</label>
                <input type="text" name="username" class="form-control" placeholder="Введите ваш логин" required autocomplete="off">
            </div>
            <div class="mb-4">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" placeholder="Введите ваш пароль" required>
            </div>
            <button type="submit" class="btn btn-corp w-100">
                Войти в систему
            </button>
        </form>

        <div class="text-center mt-4">
            <small class="text-muted" style="font-size: 0.75rem;">© 2026 Miracle_2.0. Все права защищены.</small>
        </div>
    </div>
</body>
</html>
